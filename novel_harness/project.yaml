project:
  title: "未归之账"
  title_status: "temporary"
  genre:
    - "男性向穿越"
    - "统计系统"
    - "架空战国"
    - "低武争霸"
    - "制度建设"
  source_bible: "../NOVEL_BLUEPRINT.md"

target_reader:
  primary: "喜欢系统文、穿越文、争霸文、制度建设文的男性向读者"
  secondary: "对历史、诸子百家、社会系统、控制论隐喻感兴趣的读者"
  avoid:
    - "强行感情戏"
    - "现代价值观无成本碾压古代"
    - "大段论文式说教"

narrative_contract:
  protagonist: "许衡，现代自动化/控制系统工程背景穿越者"
  main_hook: "统计系统帮助主角看见古代账册不记录的迟来成本"
  core_phrase: "谁承其险，谁得其偿；谁取其利，谁还其费。"
  first_major_turn: "旧宗庙与铁官作坊前，公羊度启发主角理解礼乐、铁器与未归之账"
  macro_arc: "小术赚钱只是门票；主角必须经过役棚、村社、铁炉、流民小邑四级失败与修正，才形成衡山试验田和衡学"
  hengshan_contract: "衡山从西横废里/横山废里逐步长成衡山里、衡山、衡学，不是开局自带仙山名望"
  emotional_engine: "人物羁绊先于理论；伍仓、陈简、许录、葛婶与孙子、公羊度等人要把制度问题变成主角想保护的具体人"
  system_persona: "中后期系统可形成衡仪人格，带有现代白月光师艺的认知回声；她负责陪伴、追问和翻译控制论，不提供万能答案"
  inference_contract: "公理与推论必须由前文经历、现代记忆、读书经验和草蛇灰线平滑导出，让读者像共同推理者，而不是被作者教育"

system_rules:
  name: "统计系统"
  can:
    - "显示统计项"
    - "估算趋势"
    - "提示被遗漏的迟来成本"
    - "随主角认知扩展统计维度"
    - "中后期形成衡仪人格接口，帮助主角复盘、追问 target、转译现代控制论"
  cannot:
    - "发放物品"
    - "抽奖"
    - "直接杀敌"
    - "保证绝对正确"
    - "替主角说服他人"
    - "直接给出最佳政策或替读者总结理论"

style:
  prose: "旁白现代清楚，人物对白略有时代感"
  tone: "早中期允许轻松、机灵、略带倒霉喜剧感；不要苦大仇深，不要把每个情节写成社会论文"
  humor: "幽默来自职业错位、现实打脸、人物误会和系统冷淡补刀；避免把现代术语硬套成生硬比喻"
  foreshadowing: "每卷保持 1-3 条草蛇灰线，前期像笑点、小物件或闲话，后期回收成关键认知、制度或剧情转折"
  theory_visibility: "低到中。读者应先看见剧情，再理解理论。"
  chapter_length_target_cn_chars: "3000-5000"
  scene_density: "每章至少一个具体场景推进"
  cliffhanger: "多数章节结尾保留新问题、新账目、新危机或人物选择"

quality_gates:
  - "本章必须有明确剧情推进"
  - "主角认知成长不能跳跃"
  - "主角不能越过当前四级认知阶梯：役棚、村社、铁炉、流民小邑"
  - "不能把控制论术语直接塞给古人"
  - "系统提示必须克制"
  - "不写女主式暧昧线"
  - "早中期支线必须自然收束到旧宗庙与铁官作坊的转折点"
  - "中后期支线必须能服务衡山试验田、衡学和稳定系统扩张"
  - "现代小术赚到的钱只能提供试验资格，不能替代组织、信用和制度"
  - "人物死亡必须推动制度升级，不能只为煽情"
  - "系统人格不能过早出现；衡仪出现后也只能追问、校验和陪伴，不能代替主角决策"
  - "核心理论命名前必须先有足够现象和失败，让读者能参与推导"
  - "价值偏好必须追问成本来源、利益去向和迟来反馈，不能只写成权力外包成本"
  - "避免持续苦大仇深；压力场景后要有生活气、笑点或人物机锋"
  - "每卷最多重点经营 1-3 条草蛇灰线，不要伏笔泛滥"
  - "笑点要自然，避免生造技术黑话或过长比喻"
